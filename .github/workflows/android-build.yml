name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 깃허브 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 빌드 환경 세팅 (🔥 Node.js 22로 확실히 고정!)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 3. 안드로이드 빌드용 Java 세팅 (Java 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 4. 앱 조립 및 네이티브 정보 추출/권한 코드 주입
      run: |
        mkdir -p CleanWorkspace/www
        cp index.html speedtest.js style.css speedtest-worker.js CleanWorkspace/www/ 2>/dev/null || true
        cp -r www/* CleanWorkspace/www/ 2>/dev/null || true
        cd CleanWorkspace
        npm init -y
        npm install @capacitor/core@latest @capacitor/android@latest @capacitor/geolocation@latest
        npm install -D @capacitor/cli@latest
        npx cap init "Network Tester" "com.tester.app" --web-dir www
        npx cap add android

        # 📍 권한 설정 (전화상태 + GPS)
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.READ_PHONE_STATE" />' android/app/src/main/AndroidManifest.xml

        # 📍 MainActivity.java 수정 (부품 등록 및 권한 체크 로직)
        # 1. 필요한 라이브러리 추가
        sed -i '/import com.getcapacitor.BridgeActivity;/a import android.telephony.TelephonyManager;\nimport android.content.Context;\nimport android.os.Bundle;\nimport androidx.core.app.ActivityCompat;\nimport android.content.pm.PackageManager;\nimport com.getcapacitor.JSObject;\nimport com.getcapacitor.annotation.CapacitorPlugin;\nimport com.getcapacitor.Plugin;\nimport com.getcapacitor.PluginCall;\nimport com.getcapacitor.PluginMethod;' android/app/src/main/java/com/tester/app/MainActivity.java
        
        # 2. 실행 시 전화 권한 팝업 강제로 띄우기
        sed -i '/public class MainActivity/a \    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        registerPlugin(NetworkInfoPlugin.class);\n        if (ActivityCompat.checkSelfPermission(this, "android.permission.READ_PHONE_STATE") != PackageManager.PERMISSION_GRANTED) {\n            ActivityCompat.requestPermissions(this, new String[]{"android.permission.READ_PHONE_STATE"}, 101);\n        }\n    }' android/app/src/main/java/com/tester/app/MainActivity.java

        # 3. NetworkInfo 플러그인 클래스 정의
        sed -i '/public class MainActivity/i @CapacitorPlugin(name = "NetworkInfo")\nclass NetworkInfoPlugin extends Plugin {\n    @PluginMethod\n    public void getDetail(PluginCall call) {\n        TelephonyManager tm = (TelephonyManager) getContext().getSystemService(Context.TELEPHONY_SERVICE);\n        JSObject ret = new JSObject();\n        try {\n            String hplmn = tm.getSimOperator();\n            String hplmnName = "현지심";\n            if (hplmn.equals("45006")) hplmnName = "LG U+";\n            else if (hplmn.startsWith("45005") || hplmn.startsWith("45003")) hplmnName = "SKT";\n            else if (hplmn.startsWith("45008") || hplmn.startsWith("45002")) hplmnName = "KT";\n            \n            String opName = tm.getNetworkOperatorName();\n            int netType = tm.getDataNetworkType();\n            String rat = "LTE";\n            if (netType == 20) rat = "5G";\n            \n            ret.put("hplmnName", hplmnName);\n            ret.put("operatorName", opName);\n            ret.put("rat", rat);\n            call.resolve(ret);\n        } catch (Exception e) {\n            call.reject(e.getMessage());\n        }\n    }\n}' android/app/src/main/java/com/tester/app/MainActivity.java
 
    
    - name: 5. 안드로이드 APK 진짜로 굽기
      run: |
        cd CleanWorkspace/android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 6. 완성된 APK 다운로드 링크 만들기
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTester-App
        path: CleanWorkspace/android/app/build/outputs/apk/debug/app-debug.apk
