name: Build Android APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 웹 도구(Node.js) 세팅하기
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. 꼬인 폴더 삭제하고 안드로이드 뼈대 새로 만들기!
      run: |
        npm install @capacitor/core @capacitor/cli @capacitor/android
        rm -rf android
        npx cap add android
        npx cap sync

    - name: 4. 안드로이드 빌드용 Java(JDK) 세팅하기
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: 5. 안드로이드 APK 파일 진짜로 굽기!
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 6. 구워진 APK 파일 다운로드할 수 있게 올리기
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTester-App
        path: android/app/build/outputs/apk/debug/app-debug.apk
