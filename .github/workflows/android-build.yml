name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 깃허브 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 빌드 환경 세팅 (Node.js 20)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: 3. 안드로이드 빌드용 Java 세팅 (🔥 Java 21로 업데이트!)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 4. 내 파일만 쏙 빼서 백지상태에서 앱 조립하기!
      run: |
        mkdir -p CleanWorkspace/www
        # 내 웹 파일 4개만 안전하게 무균실로 대피
        cp index.html speedtest.js style.css speedtest-worker.js CleanWorkspace/www/ 2>/dev/null || true
        cp -r www/* CleanWorkspace/www/ 2>/dev/null || true
        cd CleanWorkspace
        npm init -y
        npm install @capacitor/core@latest @capacitor/android@latest
        npm install -D @capacitor/cli@latest
        npx cap init "Network Tester" "com.tester.app" --web-dir www
        npx cap add android

    - name: 5. 안드로이드 APK 진짜로 굽기
      run: |
        cd CleanWorkspace/android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 6. 완성된 APK 다운로드 링크 만들기
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTester-App
        path: CleanWorkspace/android/app/build/outputs/apk/debug/app-debug.apk
