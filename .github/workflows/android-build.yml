name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 내 깃허브 코드 가져오기
      uses: actions/checkout@v4

    - name: 2. 빌드 환경 세팅 (🔥 Node.js 22로 확실히 고정!)
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: 3. 안드로이드 빌드용 Java 세팅 (Java 21)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: 4. 앱 조립 및 네이티브 코드 완벽 주입
      run: |
        mkdir -p CleanWorkspace/www
        cp index.html speedtest.js style.css speedtest-worker.js CleanWorkspace/www/ 2>/dev/null || true
        cp -r www/* CleanWorkspace/www/ 2>/dev/null || true
        cd CleanWorkspace
        npm init -y
        npm install @capacitor/core@latest @capacitor/android@latest @capacitor/geolocation@latest
        npm install -D @capacitor/cli@latest
        npx cap init "Network Tester" "com.tester.app" --web-dir www
        npx cap add android

        # 📍 1. 권한 설정 (GPS + 전화상태)
        sed -i 's/<application/<application android:usesCleartextTraffic="true"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<\/manifest>/i \    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.READ_PHONE_STATE" />' android/app/src/main/AndroidManifest.xml

        # 📍 2. MainActivity.java 파일을 완벽한 구조로 새로 쓰기 (문법 에러 원천 차단)
        cat <<EOF > android/app/src/main/java/com/tester/app/MainActivity.java
        package com.tester.app;

        import android.os.Bundle;
        import android.telephony.TelephonyManager;
        import android.content.Context;
        import androidx.core.app.ActivityCompat;
        import android.content.pm.PackageManager;
        import com.getcapacitor.BridgeActivity;
        import com.getcapacitor.JSObject;
        import com.getcapacitor.annotation.CapacitorPlugin;
        import com.getcapacitor.Plugin;
        import com.getcapacitor.PluginCall;
        import com.getcapacitor.PluginMethod;

        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                registerPlugin(NetworkInfoPlugin.class);
                // 실행 시 전화 권한 요청
                if (ActivityCompat.checkSelfPermission(this, "android.permission.READ_PHONE_STATE") != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, new String[]{"android.permission.READ_PHONE_STATE"}, 101);
                }
            }
        }

        @CapacitorPlugin(name = "NetworkInfo")
        class NetworkInfoPlugin extends Plugin {
            @PluginMethod
            public void getDetail(PluginCall call) {
                TelephonyManager tm = (TelephonyManager) getContext().getSystemService(Context.TELEPHONY_SERVICE);
                JSObject ret = new JSObject();
                try {
                    String hplmn = tm.getSimOperator();
                    String hplmnName = "현지심";
                    if (hplmn.equals("45006")) hplmnName = "LG U+";
                    else if (hplmn.startsWith("45005") || hplmn.startsWith("45003")) hplmnName = "SKT";
                    else if (hplmn.startsWith("45008") || hplmn.startsWith("45002")) hplmnName = "KT";
                    
                    String opName = tm.getNetworkOperatorName();
                    int netType = tm.getDataNetworkType();
                    String rat = "LTE";
                    if (netType == 20) rat = "5G";
                    
                    ret.put("hplmnName", hplmnName);
                    ret.put("operatorName", opName);
                    ret.put("rat", rat);
                    call.resolve(ret);
                } catch (Exception e) {
                    call.reject(e.getMessage());
                }
            }
        }
        EOF
    
    - name: 5. 안드로이드 APK 진짜로 굽기
      run: |
        cd CleanWorkspace/android
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon

    - name: 6. 완성된 APK 다운로드 링크 만들기
      uses: actions/upload-artifact@v4
      with:
        name: NetworkTester-App
        path: CleanWorkspace/android/app/build/outputs/apk/debug/app-debug.apk
